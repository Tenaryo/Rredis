name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion! Please describe the feature you'd like.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: Is this feature related to a problem? Please describe.
      placeholder: I'm frustrated when [...]
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      options:
        - New Redis Command
        - Data Type
        - Performance Improvement
        - Replication / HA
        - Build / CI
        - Documentation
        - Other
    validations:
      required: true
